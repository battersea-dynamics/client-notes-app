<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f2937" />
    <title>Client Notes</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="apple-touch-icon" href="icons/icon-192.svg" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>Client Notes</h1>
        <p>Enter patient session notes and save to the shared log.</p>
      </header>

      <section class="card" id="adminSetup">
        <h2>Admin Setup</h2>

        <label for="clientId">Google OAuth Client ID</label>
        <input id="clientId" type="text" />

        <label for="spreadsheetId">Spreadsheet ID</label>
        <input id="spreadsheetId" type="text" />

        <div class="button-row">
          <button id="connectBtn">Connect Google</button>
          <button id="disconnectBtn" class="secondary" disabled>Disconnect</button>
        </div>
      </section>

      <section class="card">
        <h2>Session Entry</h2>

        <label for="patientCode">Patient Code</label>
        <input id="patientCode" type="text" placeholder="e.g. P001" />

        <label for="therapistName">Therapist</label>
        <input id="therapistName" type="text" placeholder="Your name" />

        <label for="entryDate">Date</label>
        <input id="entryDate" type="date" />

        <label for="notesInput">Note</label>
        <textarea id="notesInput" rows="6" placeholder="Brief session note..."></textarea>

        <div class="button-row">
          <button id="saveBtn" disabled>Save Entry</button>
        </div>

        <p id="status" class="status">Connect to enable saving.</p>
      </section>
    </main>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="app.js"></script>
  </body>
</html>
