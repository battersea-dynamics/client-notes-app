<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f2937" />
    <title>Client Notes</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="apple-touch-icon" href="icons/icon-192.svg" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
       <div class="logo-container">
         <img src="logo.png" class="app-logo" alt="Battersea Dynamics logo" />
       </div>
       <h1 class="app-title">Easy Notes</h1>
      </header>
      <section class="card">
        <h2>Session Entry</h2>

        <label for="patientCode">Patient</label>
        <select id="patientCode">
         <option value="">patients...</option>
        </select>

        <label for="therapistName">Therapist</label>
        <input id="therapistName" type="text" placeholder="Your name" />

        <label for="entryDate">Date</label>
        <input id="entryDate" type="date" />

        <label for="notesInput">Note</label>

          <div class="note-input-row">
            <textarea id="notesInput" rows="6" placeholder="Brief session note..."></textarea>
              <div class="dictation-buttons">
                <button id="dictateBtn" type="button" class="dictate-btn">🎤 Dictate</button>
                <button id="stopDictationBtn" type="button" class="stop-btn">⏹ Stop</button>
              </div>
          </div>

        <div class="button-row">
          <button id="saveBtn">Save Entry</button>
        </div>

        <p id="status" class="status">Ready to save notes.</p>
      </section>
    </main>

    <footer class="app-footer">
      by Battersea Dynamics
    </footer>

    <script src="offline-queue.js"></script>
    <script src="app.js"></script>
  </body>
</html>
